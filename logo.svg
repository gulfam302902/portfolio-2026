<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 36" fill="none">
  <!-- Logo mark -->
  <rect width="36" height="36" rx="9" fill="url(#lg)"/>
  <text x="18" y="25" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800"
        text-anchor="middle" fill="white" letter-spacing="-1">A</text>
  <!-- Wordmark -->
  <text x="48" y="24" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700"
        fill="#F0F2FF" letter-spacing="-0.4">Automaze</text>
  <text x="117" y="24" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="400"
        fill="#7B8FFF" letter-spacing="-0.3"> Studio</text>
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5B6FFF"/>
      <stop offset="100%" stop-color="#7B5BFF"/>
    </linearGradient>
  </defs>
</svg>
