<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading… | Automaze Studio Blog</title>
  <meta name="robots" content="index, follow">
  <meta name="author" content="Automaze Studio">
  <meta name="theme-color" content="#080A0F">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
  <link rel="stylesheet" href="../assets/css/design-system.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/blog.css">
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"></noscript>
</head>
<body>
  <div class="page-content" id="main-page">
    <div id="category-container">
      <div class="post-loading" aria-live="polite">
        <div class="spinner" aria-hidden="true"></div>
        <p style="font-size:var(--text-sm);color:var(--color-text-muted);">Loading articles…</p>
      </div>
    </div>
  </div>

  <script src="../assets/js/blog-engine.js"></script>
  <script src="../assets/js/seo.js"></script>
  <script src="../assets/js/components.js"></script>
  <script>
  /* ============================================================
     CATEGORY PAGE — universal template for all categories
  ============================================================ */

  const CAT_META = {
    'web-development': {
      label:'Web Development',
      headline:'Guides, tutorials, and deep-dives on building modern websites that perform.',
      intro:`Web development is moving fast. Every article in this collection is written from real project work — not theory, not filler. Whether you're learning to build faster sites, understanding modern tooling, or trying to write cleaner code, you'll find practical, experience-backed insight here.`,
      emoji:'⚡', accent:'#5B6FFF',
    },
    'seo': {
      label:'SEO & Search Performance',
      headline:'Technical SEO, content strategy, and ranking tactics that actually move the needle.',
      intro:`Ranking on Google isn't about tricks — it's about technical fundamentals and content that genuinely answers what people search for. This collection covers Core Web Vitals, schema markup, crawl optimization, keyword architecture, and the real mechanics behind modern search engine performance.`,
      emoji:'🔍', accent:'#00D4AA',
    },
    'conversion-optimization': {
      label:'Conversion Optimization',
      headline:'Turn more of your existing traffic into customers with smarter design decisions.',
      intro:`Most businesses focus on getting more traffic. The higher-leverage move is getting more from the traffic you already have. Conversion optimization is the discipline of removing friction, building trust, and designing user journeys that guide people toward taking action. This is where it lives.`,
      emoji:'🎯', accent:'#F59E0B',
    },
    'ux-design': {
      label:'UX Design',
      headline:'Interface design that reduces friction, builds trust, and makes complex things clear.',
      intro:`Good UX design isn't invisible — it's the difference between a website that converts and one that confuses. Every article here covers the principles, patterns, and practical techniques behind interfaces that actually work for real users.`,
      emoji:'✨', accent:'#8B5CF6',
    },
  };

  const DEFAULT_META = {
    label:'All Articles', emoji:'📝', accent:'#5B6FFF',
    headline:'Expert articles on web development, SEO, UX, and conversion optimization.',
    intro:'In-depth guides written from real project experience.',
  };

  async function loadCategory() {
    // Detect slug from filename OR URL param
    const params  = new URLSearchParams(location.search);
    let catSlug   = params.get('cat') || '';

    // If no param, try to infer from pathname (e.g. /category/seo.html)
    if (!catSlug) {
      const match = location.pathname.match(/\/category\/([^/]+?)(?:\.html)?$/);
      catSlug = match ? match[1] : '';
    }

    const posts    = await BlogEngine.parseBlogFile('../content/blog/index.json');
    const cats     = BlogEngine.getCategories(posts);
    const meta     = CAT_META[catSlug] || DEFAULT_META;
    const filtered = catSlug ? posts.filter(p => p.categorySlug === catSlug) : posts;

    // Apply SEO
    SEO.applyCategory(meta.label, catSlug || 'blog');

    renderCategory(meta, catSlug, filtered, cats);
  }

  function renderCategory(meta, catSlug, posts, allCats) {
    const container = document.getElementById('category-container');

    container.innerHTML = `

      <!-- PAGE HERO -->
      <header class="page-hero" aria-labelledby="cat-heading">
        <div class="page-hero-grid" aria-hidden="true"></div>
        <div class="container" style="position:relative;z-index:1;">
          <nav class="breadcrumb" aria-label="Breadcrumb" style="margin-bottom:var(--space-6);">
            <a href="../index.html">Home</a>
            <span class="breadcrumb-sep" aria-hidden="true">›</span>
            <a href="../blog/index.html">Blog</a>
            <span class="breadcrumb-sep" aria-hidden="true">›</span>
            <span class="breadcrumb-current" aria-current="page">${meta.label}</span>
          </nav>
          <div style="max-width:700px;">
            <p class="section-label">${meta.emoji} ${meta.label}</p>
            <h1 class="display-md gradient-text" id="cat-heading">${meta.headline}</h1>
            <p class="body-lg text-secondary" style="margin-top:var(--space-5);">${meta.intro}</p>
            <div style="margin-top:var(--space-6);">
              <span class="badge badge-neutral">${posts.length} ${posts.length===1?'article':'articles'}</span>
            </div>
          </div>
        </div>
      </header>

      <!-- CATEGORY TABS -->
      <div style="border-bottom:1px solid var(--color-border);background:var(--color-bg-2);">
        <div class="container">
          <nav style="display:flex;gap:var(--space-1);overflow-x:auto;padding:var(--space-2) 0;" aria-label="Blog categories">
            <a href="../blog/" class="btn btn-ghost btn-sm ${!catSlug?'btn-active':''}" id="cat-tab-all">All</a>
            ${allCats.map(c => `
              <a href="${c.slug}/" class="btn btn-ghost btn-sm ${c.slug===catSlug?'btn-active':''}" id="cat-tab-${c.slug}">
                ${c.name} <span style="opacity:.5;font-size:.75em;">${c.count}</span>
              </a>`).join('')}
          </nav>
        </div>
      </div>

      <!-- ARTICLES GRID -->
      <main class="section" id="main-content">
        <div class="container">
          ${posts.length ? `
            <div id="cat-grid" class="blog-grid">
              ${posts.map((p, i) => renderCard(p, i)).join('')}
            </div>
          ` : `
            <div style="text-align:center;padding:var(--space-16);">
              <p class="heading-lg" style="margin-bottom:var(--space-4);">No articles yet</p>
              <p class="body-md text-secondary">Check back soon — we publish weekly.</p>
              <a href="../blog/index.html" class="btn btn-primary" style="margin-top:var(--space-6);" id="cat-empty-blog">Browse All Articles</a>
            </div>`}
        </div>
      </main>

      <!-- RELATED CATEGORIES -->
      <section class="section-sm" style="background:var(--color-bg-2);border-top:1px solid var(--color-border);" aria-labelledby="other-cats-heading">
        <div class="container">
          <p class="section-label" style="justify-content:center;margin-bottom:var(--space-6);">Explore Other Topics</p>
          <div style="display:flex;gap:var(--space-4);flex-wrap:wrap;justify-content:center;">
            ${allCats.filter(c=>c.slug!==catSlug).map(c=>`
              <a href="${c.slug}/" class="card" style="padding:var(--space-4) var(--space-6);text-decoration:none;display:inline-flex;align-items:center;gap:var(--space-3);" id="other-cat-${c.slug}">
                <span>${BlogEngine.getCatColor(c.slug).emoji}</span>
                <span style="font-size:var(--text-sm);font-weight:600;color:var(--color-text-primary);">${c.name}</span>
                <span class="badge badge-neutral">${c.count}</span>
              </a>`).join('')}
          </div>
        </div>
      </section>
    `;

    // Scroll reveal
    setTimeout(() => {
      document.querySelectorAll('.reveal').forEach((el, i) => {
        setTimeout(() => el.classList.add('revealed'), i * 80);
      });
    }, 100);
  }

  function renderCard(p, i) {
    const col = BlogEngine.getCatColor(p.categorySlug);
    return `
      <article class="card post-card reveal" style="animation-delay:${i*0.05}s;" id="cat-card-${p.id}" aria-labelledby="cat-post-${p.id}">
        <div class="post-card-meta">
          <a href="${p.categorySlug}/" class="cat-tag">${p.category}</a>
          <span class="post-card-read-time">${p.readTime}</span>
        </div>
        <a href="../blog/${p.slug}/" class="post-card-title" id="cat-post-${p.id}" aria-label="Read: ${p.title}">${p.title}</a>
        <p class="post-card-excerpt">${p.excerpt}</p>
        <div class="post-card-footer">
          <time datetime="${p.date}" class="post-card-read-time">${BlogEngine.formatDate(p.date)}</time>
          <a href="../blog/${p.slug}/" class="post-card-arrow" aria-hidden="true">→</a>
        </div>
      </article>`;
  }

  loadCategory();
  </script>
</body>
</html>
