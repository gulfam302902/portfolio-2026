<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080A0F" />
      <stop offset="100%" stop-color="#141824" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B6FFF" />
      <stop offset="100%" stop-color="#00D4AA" />
    </linearGradient>
    
    <!-- Subtle Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.02)" stroke-width="1"/>
    </pattern>

    <!-- Radial Glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5B6FFF" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#080A0F" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  
  <!-- Glow Effect -->
  <circle cx="400" cy="225" r="300" fill="url(#glow)"/>

  <!-- Branded Graphic Outer Border -->
  <rect x="20" y="20" width="760" height="410" rx="12" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="2"/>
  
  <!-- Graphic Centerpiece -->
  <g transform="translate(400, 190)">
    <!-- Outer Octagon or Diamond Shape -->
    <path d="M -40,-40 L 0,-60 L 40,-40 L 60,0 L 40,40 L 0,60 L -40,40 L -60,0 Z" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.8"/>
    
    <!-- Inner Diamond -->
    <path d="M 0,-30 L 25,0 L 0,30 L -25,0 Z" fill="rgba(91, 111, 255, 0.1)" stroke="url(#accentGrad)" stroke-width="1.5"/>
    
    <!-- Image Icon inside Diamond -->
    <path d="M -10,-5 L 10,-5 L 10,8 L -10,8 Z" fill="none" stroke="#F0F2FF" stroke-width="1.5"/>
    <circle cx="-4" cy="-1" r="2" fill="#F0F2FF"/>
    <path d="M -8,6 L -2,0 L 4,4 L 8,1" fill="none" stroke="#F0F2FF" stroke-width="1.5"/>
  </g>

  <!-- Typography -->
  <text x="400" y="285" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="700" fill="#F0F2FF" letter-spacing="2">
    AUTOMAZE STUDIO
  </text>
  <text x="400" y="315" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="500" fill="#9BA3BF" letter-spacing="1">
    IMAGE PENDING UPLOAD
  </text>
  <text x="400" y="340" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="400" fill="#5C6480">
    Aspect ratio &amp; layout integrity protected
  </text>
</svg>
